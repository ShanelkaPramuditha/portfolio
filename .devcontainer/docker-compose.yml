services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_USER_EMAIL: ${GIT_USER_EMAIL}
        GIT_USER_NAME: ${GIT_USER_NAME}
    env_file:
      - .env
    volumes:
      - ../..:/workspaces:cached
      - ~/.claude:/root/.claude
    command: sleep infinity
    network_mode: host
